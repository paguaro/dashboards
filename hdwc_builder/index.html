    formula: 'foehDelta = wind_score_matched × delta_alpha_per_score_unit\nAlpha += foehDelta se vento dominante match\n\nMatch richiede: direzione ∈ [from, to] AND speed ≥ min_speed_kmh',
    example: 'delta=0.005, Maestrale score=3:\nfoehDelta = 3 × 0.005 = +0.015\n→ notevole contributo α in giornata di Maestrale',
    range: '0.001–0.015  |  default: 0.005',
    affects: 'calcAlpha_v2 (foehDelta)'
  }
};

// ─── POPOVER ENGINE ───────────────────────────────────────────────────────────
let _activePopoverKey = null;

function _iBadge(docKey) {
  return `<span class="info-badge" onclick="event.stopPropagation();showParamDoc('${docKey}',this)">i</span>`;
}

function showParamDoc(key, el) {
  const doc = PARAM_DOC[key];
  if (!doc) return;

  // Toggle
  if (_activePopoverKey === key) {
    hideParamDoc(); return;
  }

  _activePopoverKey = key;
  document.querySelectorAll('.info-badge').forEach(b => b.classList.remove('active'));
  el.classList.add('active');

  let body = `<div class="pop-short">${doc.short}</div>`;
  if (doc.formula) body += `<div class="pop-block"><div class="pop-block-label">Formula</div><div class="pop-block-content">${doc.formula}</div></div>`;
  if (doc.example) body += `<div class="pop-block"><div class="pop-block-label">Esempio</div><div class="pop-block-content">${doc.example}</div></div>`;
  if (doc.range)   body += `<div class="pop-range"><b>Range tipico:</b> ${doc.range}</div>`;
  if (doc.affects) body += `<div class="pop-affects">Usato da: ${doc.affects}</div>`;

  const pop = document.getElementById('param-popover');
  pop.innerHTML = `
    <div class="pop-header" id="pop-header-drag">
      <span>${doc.title}</span>
      <button class="pop-close" onclick="hideParamDoc()">✕</button>
    </div>
    <div class="pop-body">${body}</div>`;

  // Reset any leftover size from previous resize, così torna alla dimensione di default
  pop.style.width = '';
  pop.style.height = '';

  pop.classList.add('visible');

  // Position: vicino al badge ma clampato nella viewport.
  // max-height:85vh sul popover + overflow-y su .pop-body garantiscono
  // che contenuti lunghi non sforino mai — scrollano internamente.
  const rect = el.getBoundingClientRect();
  const vw = window.innerWidth, vh = window.innerHeight;
  const pw = pop.offsetWidth  || 340;
  const ph = pop.offsetHeight || 320;
  let left = rect.left + rect.width + 8;
  let top  = rect.top - 8;
  if (left + pw > vw - 8) left = Math.max(8, rect.left - pw - 8);
  if (left < 8) left = 8;
  if (top + ph > vh - 8)  top  = Math.max(8, vh - ph - 8);
  if (top < 8)            top  = 8;
  pop.style.left = left + 'px';
  pop.style.top  = top  + 'px';

  // Abilita drag-by-header per spostare il popover se copre contenuti
  _attachPopoverDrag(pop);
}

// ── Drag state condiviso tra tutte le aperture del popover ─────────────────
// (listener document-level registrati una sola volta, vedi in fondo)
let _popDrag = { active: false, offsetX: 0, offsetY: 0, pop: null };

function _attachPopoverDrag(pop) {
  const header = pop.querySelector('#pop-header-drag');
  if (!header) return;
  header.addEventListener('mousedown', (e) => {
    if (e.target.closest('.pop-close')) return;
    const rect = pop.getBoundingClientRect();
    _popDrag.active = true;
    _popDrag.offsetX = e.clientX - rect.left;
    _popDrag.offsetY = e.clientY - rect.top;
    _popDrag.pop = pop;
    e.preventDefault();
  });
}

function hideParamDoc() {
  _activePopoverKey = null;
  document.querySelectorAll('.info-badge').forEach(b => b.classList.remove('active'));
  document.getElementById('param-popover').classList.remove('visible');
}

document.addEventListener('click', e => {
  if (!e.target.closest('#param-popover') && !e.target.classList.contains('info-badge')) {
    hideParamDoc();
  }
});

// Drag globale del popover: listener document-level registrati una sola volta.
// Lo stato _popDrag viene settato da _attachPopoverDrag sul mousedown dell'header.
document.addEventListener('mousemove', (e) => {
  if (!_popDrag.active || !_popDrag.pop) return;
  const pop = _popDrag.pop;
  const vw = window.innerWidth, vh = window.innerHeight;
  const pw = pop.offsetWidth, ph = pop.offsetHeight;
  let nx = e.clientX - _popDrag.offsetX;
  let ny = e.clientY - _popDrag.offsetY;
  // Clamp con margine di sicurezza: almeno 60px dell'header restano
  // visibili su lato sinistro/destro, e l'header non va sotto la viewport
  nx = Math.max(-pw + 60, Math.min(vw - 60, nx));
  ny = Math.max(0, Math.min(vh - 40, ny));
  pop.style.left = nx + 'px';
  pop.style.top  = ny + 'px';
});
document.addEventListener('mouseup', () => { _popDrag.active = false; });
</script>

<!-- Popover DOM (unico, riposizionato via JS) -->
<div id="param-popover"></div>

</body>
