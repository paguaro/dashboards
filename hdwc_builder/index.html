<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDWC Engine Config Builder v8.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f3ef; color: #1a1a1a; font-family: 'DM Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #eee; } ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
  input::placeholder, textarea::placeholder { color: #777; }
  input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: #ddd; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #E05A1E; cursor: pointer; }
  input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }

  /* Layout */
  #header { background: #fff; border-bottom: 1px solid #e8e4de; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
  #main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
  #sidebar { width: 180px; background: #fff; border-right: 1px solid #e8e4de; padding: 12px 0; flex-shrink: 0; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #e0dbd4 transparent; }
  #content { flex: 1; padding: 28px 32px; overflow-y: auto; }
  #content-inner { max-width: 520px; }
  #json-panel { width: 420px; border-left: 1px solid #e8e4de; background: #fafaf8; display: flex; flex-direction: column; overflow: hidden; }
  #json-panel.hidden { display: none; }
  #footer { background: #fff; border-top: 1px solid #e8e4de; padding: 9px 24px; display: flex; justify-content: space-between; font-size: 12px; color: #222; letter-spacing: 0.08em; flex-shrink: 0; }

  /* Header brand */
  .brand-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.15em; color: #E05A1E; }
  .brand-sub { font-size: 12px; color: #777; letter-spacing: 0.12em; margin-top: 1px; }

  /* Buttons */
  .btn { border: none; padding: 7px 14px; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.06em; cursor: pointer; transition: all 0.15s; }
  .btn-ghost { background: #f5f3ef; border: 1px solid #ddd; color: #444; }
  .btn-ghost:hover { background: #ebe8e3; color: #111; }
  .btn-outline { background: #fff; border: 1px solid #ddd; color: #111; }
  .btn-outline.active { border-color: #E05A1E; color: #E05A1E; background: #fff8f5; }
  .btn-primary { background: #E05A1E; color: #fff; font-weight: 600; padding: 7px 18px; }
  .btn-primary:hover { background: #c94d18; }
  .btn-success { color: #16a34a !important; border-color: #16a34a !important; }
  .hdr-btns { display: flex; gap: 8px; align-items: center; }

  /* Sidebar nav */
  .nav-item { width: 100%; text-align: left; background: transparent; border: none; border-left: 2px solid transparent; color: #111; padding: 10px 14px; cursor: pointer; font-size: 13px; letter-spacing: 0.06em; font-family: 'DM Mono', monospace; display: flex; align-items: center; gap: 8px; transition: all 0.12s; }
  .nav-item:hover { color: #111; background: #f9f7f4; }
  .nav-item.active { color: #E05A1E; background: #fff8f5; border-left-color: #E05A1E; }
  .nav-icon { font-size: 16px; }

  /* Section heading */
  .section-label { font-size: 12px; color: #777; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 22px; }
  .divider { display: flex; align-items: center; gap: 10px; margin: 20px 0 14px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e8e4de; }
  .divider span { font-size: 11px; color: #2d2d2d; letter-spacing: 0.14em; text-transform: uppercase; white-space: nowrap; }

  /* Form controls */
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 12px; color: #111; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; }
  .field input[type=text], .field input[type=number], .field textarea {
    background: #f9f7f4; border: 1px solid #e0dbd4; color: #1a1a1a; padding: 8px 10px;
    border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 15px; outline: none;
    transition: border-color 0.15s;
  }
  .field input[type=text]:focus, .field input[type=number]:focus, .field textarea:focus { border-color: #E05A1E; }
  .field input[type=text], .field textarea { width: 100%; }
  .field input[type=number] { width: 100px; }
  .field textarea { resize: vertical; min-height: 70px; }
  .field .hint { font-size: 12px; color: #777; margin-top: 3px; }

  /* Slider field with number input */
  .slider-field { margin-bottom: 20px; }
  .slider-header { display: flex; justify-content: space-between; margin-bottom: 5px; align-items: baseline; flex-wrap: wrap; gap: 8px; }
  .slider-label { font-size: 12px; color: #111; letter-spacing: 0.08em; text-transform: uppercase; }
  .slider-value-wrapper { display: flex; align-items: center; gap: 8px; }
  .slider-value { font-size: 15px; color: #E05A1E; font-weight: 500; }
  .slider-number { width: 70px; background: #f9f7f4; border: 1px solid #e0dbd4; border-radius: 4px; padding: 4px 6px; font-family: 'DM Mono', monospace; font-size: 13px; text-align: center; color: #E05A1E; font-weight: 500; outline: none; }
  .slider-number:focus { border-color: #E05A1E; }
  .slider-field input[type=range] { width: 100%; margin-top: 4px; }
  .slider-hint { font-size: 12px; color: #777; margin-top: 3px; }

  /* Toggle */
  .toggle-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .toggle-btn { width: 44px; height: 22px; border-radius: 11px; border: none; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle-knob { width: 16px; height: 16px; border-radius: 8px; background: #fff; position: absolute; top: 3px; transition: left 0.2s; }
  .toggle-label { font-size: 13px; color: #444; letter-spacing: 0.06em; text-transform: uppercase; }
  .toggle-hint { font-size: 12px; color: #777; }

  /* Alpha grid */
  .alpha-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
  .alpha-cell { background: #f9f7f4; border: 1px solid #e8e4de; border-radius: 6px; padding: 10px 8px; text-align: center; }
  .alpha-cell .month { font-size: 12px; color: #777; margin-bottom: 6px; }
  .alpha-cell input { background: transparent; border: none; border-bottom: 1px solid #e0dbd4; color: #E05A1E; font-family: 'DM Mono', monospace; font-size: 17px; width: 100%; text-align: center; outline: none; }
  .alpha-cell input:focus { border-bottom-color: #E05A1E; }

  /* Alpha bar chart */
  .alpha-bars { display: flex; align-items: flex-end; gap: 3px; height: 50px; margin-bottom: 10px; }
  .alpha-bar { flex: 1; border-radius: 2px 2px 0 0; min-height: 2px; background: #E05A1E; opacity: 0.6; transition: height 0.2s; }

  /* Alpha info */
  .alpha-info { display: flex; justify-content: space-between; font-size: 12px; color: #777; margin-bottom: 12px; }

  /* Warning box */
  .warn-box { background: #fff8f5; border: 1px solid #E05A1E; border-radius: 6px; padding: 10px 12px; margin-bottom: 12px; }
  .warn-title { font-size: 12px; color: #E05A1E; margin-bottom: 4px; }
  .warn-item { font-size: 13px; color: #c94d18; }

  /* Info box */
  .info-box { background: #f9f7f4; border: 1px solid #e8e4de; border-radius: 6px; padding: 12px; margin-bottom: 18px; font-size: 14px; color: #444; line-height: 1.7; }
  .info-box span.hl { color: #E05A1E; }

  /* Washout table */
  .wash-table { border: 1px solid #e8e4de; border-radius: 6px; overflow: hidden; margin-bottom: 12px; }
  .wash-table .th { background: #f5f3ef; padding: 6px 12px; font-size: 12px; color: #777; letter-spacing: 0.08em; }
  .wash-table .tr { display: grid; grid-template-columns: 1fr 1fr; }
  .wash-table .td { padding: 7px 12px; border-top: 1px solid #f0ede8; font-size: 14px; color: #333; }
  .wash-table .td:last-child { border-left: 1px solid #f0ede8; }
  .wash-table input { background: transparent; border: none; border-bottom: 1px solid #e0dbd4; color: #1a1a1a; font-family: 'DM Mono', monospace; font-size: 14px; outline: none; width: 55px; }
  .wash-table input.orange { color: #E05A1E; }

  /* JSON panel */
  #json-header { padding: 10px 14px; border-bottom: 1px solid #e8e4de; font-size: 12px; color: #777; letter-spacing: 0.1em; display: flex; justify-content: space-between; }
  #json-pre { margin: 0; padding: 16px; overflow: auto; flex: 1; font-size: 13px; color: #155b32; line-height: 1.7; white-space: pre; font-family: 'DM Mono', monospace; background: #fafaf8; }

  /* Wind formula box */
  .formula-box { background: #f9f7f4; border: 1px solid #e8e4de; border-radius: 6px; padding: 12px 16px; margin-bottom: 20px; font-size: 16px; color: #111; }

  /* Night score table */
  .score-table { border: 1px solid #e8e4de; border-radius: 6px; overflow: hidden; margin-bottom: 16px; }
  .score-row { display: grid; grid-template-columns: 80px 1fr; border-bottom: 1px solid #f0ede8; }
  .score-row:last-child { border-bottom: none; }
  .score-badge { padding: 8px 12px; font-size: 13px; font-weight: 500; }
  .score-desc { padding: 8px 12px; font-size: 13px; color: #444; }

  .wind-warning { background: #fff8f5; border: 1px solid #E05A1E; border-radius: 6px; padding: 10px; font-size: 13px; color: #c94d18; margin-top: 8px; }

  /* Grid helpers */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Soglie mensili */
  .soglie-tabs { display: flex; gap: 0; margin-bottom: 16px; border: 1px solid #e8e4de; border-radius: 6px; overflow: hidden; }
  .soglie-tab { flex: 1; background: #f9f7f4; border: none; padding: 7px 4px; font-family: 'DM Mono', monospace; font-size: 12px; color: #222; cursor: pointer; letter-spacing: 0.04em; transition: all 0.12s; border-right: 1px solid #e8e4de; }
  .soglie-tab:last-child { border-right: none; }
  .soglie-tab.active { background: #fff; color: #1a1a1a; font-weight: 500; }
  .soglie-tab:hover:not(.active) { background: #f0ede8; }

  .soglie-matrix { width: 100%; border-collapse: collapse; font-size: 13px; }
  .soglie-matrix th { background: #f5f3ef; padding: 6px 8px; text-align: center; font-size: 11px; color: #222; letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid #e8e4de; font-weight: 400; }
  .soglie-matrix th.month-col { text-align: left; min-width: 36px; }
  .soglie-matrix td { padding: 4px 4px; border-bottom: 1px solid #f5f3ef; text-align: center; }
  .soglie-matrix tr:last-child td { border-bottom: none; }
  .soglie-matrix td.month-name { font-size: 12px; color: #444; text-align: left; padding-left: 2px; }
  .soglie-matrix input { width: 58px; background: #f9f7f4; border: 1px solid #e8e4de; border-radius: 3px; padding: 4px 4px; font-family: 'DM Mono', monospace; font-size: 14px; text-align: center; outline: none; color: #1a1a1a; transition: border-color 0.12s; }
  .soglie-matrix input:focus { border-color: #E05A1E; }

  .level-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .soglie-legend { display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .soglie-legend-item { display: flex; align-items: center; font-size: 12px; color: #444; }

  .soglie-visual { display: flex; gap: 2px; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 6px; margin-bottom: 14px; }
  .soglie-visual-seg { flex: 1; }

  .month-row-highlight:hover td { background: #faf8f5; }

  .validate-btn { background: #f5f3ef; border: 1px solid #ddd; color: #444; padding: 6px 12px; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; letter-spacing: 0.06em; margin-bottom: 12px; }
  .validate-btn:hover { background: #ebe8e3; }
  .validate-ok { color: #16a34a; font-size: 12px; margin-bottom: 10px; }
  .validate-err { color: #dc2626; font-size: 12px; margin-bottom: 10px; }

  /* Wind card list */
  .wind-card { background: #f9f7f4; border: 1px solid #e8e4de; border-radius: 6px; padding: 12px 14px; margin-bottom: 10px; position: relative; }
  .wind-card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .wind-card-title { font-size: 12px; font-weight: 600; color: #E05A1E; letter-spacing: 0.06em; text-transform: uppercase; }
  .wind-card-remove { background: none; border: 1px solid #ddd; border-radius: 3px; color: #888; cursor: pointer; font-size: 12px; padding: 2px 8px; font-family: 'DM Mono', monospace; }
  .wind-card-remove:hover { border-color: #dc2626; color: #dc2626; }
  .wind-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .wind-field label { display: block; font-size: 11px; color: #555; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 3px; }
  .wind-field input[type=text], .wind-field input[type=number], .wind-field select {
    width: 100%; background: #fff; border: 1px solid #e0dbd4; color: #1a1a1a;
    padding: 6px 8px; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 14px; outline: none;
  }
  .wind-field input:focus, .wind-field select:focus { border-color: #E05A1E; }
  .add-wind-btn { width: 100%; background: #fff; border: 1.5px dashed #E05A1E; color: #E05A1E; border-radius: 6px;
    padding: 9px; font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; letter-spacing: 0.06em;
    margin-top: 4px; transition: background 0.15s; }
  .add-wind-btn:hover { background: #fff8f5; }
  .add-wind-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .dir-badge { display: inline-block; background: #1e3a5f; color: #fff; border-radius: 3px;
    font-size: 10px; padding: 1px 5px; font-family: 'DM Mono', monospace; margin-left: 4px; }
  .import-alpha-card { background:#f0fdf4;border:1.5px solid #16a34a;border-radius:6px;padding:12px 14px;margin-bottom:12px; }
  .import-diff-row { display:grid;grid-template-columns:54px 1fr 60px 54px 52px;gap:5px;align-items:center;padding:3px 0;border-bottom:1px solid #e8e4de;font-size:12px; }
  .diff-up { color:#16a34a;font-weight:700; } .diff-down { color:#b91c1c;font-weight:700; } .diff-same { color:#aaa; }
  .src-badge { display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-family:'DM Mono',monospace;font-weight:700; }
  .src-365d { background:#dcfce7;color:#15803d; } .src-blended { background:#fef3c7;color:#b45309; } .src-global { background:#f3f4f6;color:#666; }
  .fclass-box { background: #1e3a5f; color: #f0f4ff; border-radius: 6px; padding: 12px 14px; margin-bottom: 18px; font-size: 13px; line-height: 1.8; }
  .fclass-box code { background: rgba(255,255,255,0.15); border-radius: 3px; padding: 1px 5px; font-family: 'DM Mono', monospace; }

  /* ── Info badge & popover ─────────────────────────────────────────────── */
  .info-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 15px; height: 15px; border-radius: 50%;
    background: #e8e4de; color: #666; font-size: 10px; font-weight: 600;
    cursor: pointer; vertical-align: middle; margin-left: 5px; flex-shrink: 0;
    transition: background 0.15s, color 0.15s; user-select: none;
    font-style: italic; font-family: serif; line-height: 1;
  }
  .info-badge:hover, .info-badge.active { background: #E05A1E; color: #fff; }

  #param-popover {
    position: fixed; z-index: 9999; width: 300px;
    background: #fff; border: 1px solid #e0dbd4; border-radius: 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.14); display: none;
    font-family: 'DM Mono', monospace;
  }
  #param-popover.visible { display: block; }
  .pop-header {
    background: #1e3a5f; color: #fff; padding: 9px 12px;
    border-radius: 7px 7px 0 0; font-size: 11px; font-weight: 600;
    letter-spacing: 0.09em; text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center;
  }
  .pop-close { background: none; border: none; color: rgba(255,255,255,0.55);
    font-size: 14px; cursor: pointer; padding: 0 2px; line-height: 1; }
  .pop-close:hover { color: #fff; }
  .pop-body { padding: 10px 12px; }
  .pop-short { font-size: 13px; color: #222; line-height: 1.6; margin-bottom: 9px; }
  .pop-block { margin-bottom: 8px; }
  .pop-block-label { font-size: 10px; color: #E05A1E; letter-spacing: 0.12em;
    text-transform: uppercase; margin-bottom: 3px; }
  .pop-block-content { font-size: 12px; color: #333; line-height: 1.65;
    background: #f5f3ef; border-radius: 4px; padding: 6px 8px; white-space: pre-wrap; }
  .pop-range { font-size: 12px; color: #555; margin-bottom: 5px; }
  .pop-range b { color: #E05A1E; font-weight: 500; }
  .pop-affects { font-size: 10px; color: #bbb; letter-spacing: 0.05em; margin-top: 4px; }
  .pop-warn { background: #fff8f5; border: 1px solid #E05A1E; border-radius: 4px;
    padding: 5px 8px; font-size: 12px; color: #c94d18; margin-top: 6px; }

  /* ── Zone Manager ─────────────────────────────────────────────────────────── */
  #content-inner.zm-wide { max-width: 860px; }
  .zm-toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .zm-subtabs { display: flex; gap: 0; border: 1px solid #e8e4de; border-radius: 6px; overflow: hidden; margin-bottom: 16px; }
  .zm-subtab { flex: 1; background: #f9f7f4; border: none; padding: 7px 12px; font-family: 'DM Mono', monospace;
    font-size: 12px; color: #555; cursor: pointer; letter-spacing: 0.06em; border-right: 1px solid #e8e4de; transition: all 0.12s; }
  .zm-subtab:last-child { border-right: none; }
  .zm-subtab.active { background: #fff; color: #1a1a1a; font-weight: 500; }
  .zm-subtab:hover:not(.active) { background: #f0ede8; }

  .zm-zone-list { border: 1px solid #e8e4de; border-radius: 6px; overflow: hidden; margin-bottom: 12px; }
  .zm-zone-row { display: grid; grid-template-columns: 1fr 130px 150px 48px 148px;
    gap: 0; align-items: center; border-bottom: 1px solid #f0ede8; transition: background 0.1s; }
  .zm-zone-row:last-child { border-bottom: none; }
  .zm-zone-row:hover { background: #fafaf8; }
  .zm-zone-row.selected { background: #fff8f5; border-left: 3px solid #E05A1E; }
  .zm-zone-row.zm-header { background: #f5f3ef; border-bottom: 1px solid #e8e4de; font-size: 11px;
    color: #777; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }
  .zm-zone-cell { padding: 9px 10px; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .zm-zone-name { font-weight: 500; color: #111; cursor: pointer; }
  .zm-zone-name:hover { color: #E05A1E; text-decoration: underline; }
  .zm-zone-id { font-size: 12px; color: #666; }
  .zm-zone-bbox { font-size: 11px; color: #888; font-family: 'DM Mono', monospace; }
  .zm-valid-ok { color: #16a34a; font-size: 13px; }
  .zm-valid-warn { color: #dc2626; font-size: 13px; cursor: pointer; }
  .zm-ops { display: flex; gap: 1px; padding: 4px 5px; flex-wrap: nowrap; }
  .zm-op-btn { background: transparent; border: none; cursor: pointer; padding: 3px 4px;
    border-radius: 3px; font-size: 13px; color: #777; transition: all 0.1s; }
  .zm-op-btn:hover { background: #f0ede8; color: #333; }
  .zm-op-btn.danger:hover { color: #dc2626; background: #fef2f2; }

  .zm-empty { text-align: center; padding: 40px 20px; color: #aaa; font-size: 13px; border: 1px dashed #e8e4de;
    border-radius: 6px; background: #fafaf8; margin-bottom: 12px; }
  .zm-add-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .zm-err-list { background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px;
    padding: 10px 14px; margin-bottom: 12px; font-size: 12px; color: #dc2626; }
  .zm-err-list ul { margin: 4px 0 0 16px; }
  .zm-err-list li { margin-bottom: 2px; }

  .zm-tpl-select { background: #f9f7f4; border: 1px solid #e0dbd4; border-radius: 4px;
    padding: 7px 10px; font-family: 'DM Mono', monospace; font-size: 13px; color: #444;
    cursor: pointer; outline: none; min-width: 180px; }
  .zm-tpl-select:focus { border-color: #E05A1E; }

  #zm-map { height: 480px; border: 1px solid #e8e4de; border-radius: 6px; overflow: hidden; background: #e8e4de; }
  .zm-map-hint { font-size: 12px; color: #777; margin-bottom: 8px; line-height: 1.5; }

  .zm-export-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; padding-top: 12px;
    border-top: 1px solid #e8e4de; }
  .zm-pkg-count { font-size: 12px; color: #777; letter-spacing: 0.06em; padding: 7px 0; margin-right: 4px; }
  .zm-inline-edit { background: transparent; border: none; border-bottom: 1px dashed #ccc;

<body>

<!-- HEADER -->

</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <button class="nav-item active" data-section="meta"><span class="nav-icon">⬡</span>IDENTITÀ</button>

      <span class="nav-icon">📡</span>IMPORT α ERA5
    </button>
    <button class="nav-item" data-section="vegetation"><span class="nav-icon">◈</span>VEGETAZIONE</button>
    <button class="nav-item" data-section="classification"><span class="nav-icon">◉</span>CLASSIFICAZIONE</button>
    <button class="nav-item" data-section="night"><span class="nav-icon">◐</span>NOTTI</button>
    <button class="nav-item" data-section="streak"><span class="nav-icon">◆</span>STREAK / α</button>
    <button class="nav-item" data-section="alpha"><span class="nav-icon">◇</span>ALPHA MENSILE</button>
    <button class="nav-item" data-section="washout"><span class="nav-icon">◎</span>WASHOUT</button>

  <!-- JSON PANEL -->

    <div id="json-header">
      <span>OUTPUT JSON</span>
      <span id="json-chars">—</span>

</div>

<!-- FOOTER -->

  <span id="footer-left">HDWC ENGINE · —</span>
  <span id="footer-right">—</span>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const MONTHS = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];

let config = {
  meta: {
    preset_name: "", region_id: "", version: "1.0.0",
    created: new Date().toISOString().slice(0,10), author: "", notes: "",
    bbox: [null, null, null, null]
  },
  vegetation: {
    days_to_severe_stress: 8,
    RH_wilt: 38, VPD_stress: 2.0
  },
  classification: {
    Rain_effective_mm: 2,
    Tmax_class2: 30, Tmax_class3: 35,
    HDW_eff_class2: 60, HDW_eff_class3: 120,
    RH_dry: 60, RH_very_dry: 40
  },
  night: {
    T_night_warm: 18, T_night_tropical: 20, T_night_severe: 25,
    night_hours_min: 4, night_window_start: "20:00", night_window_end: "08:00"
  },
  streak: {
    streak_activation_days: 4,
    delta_alpha_dry_class2: 0.005, delta_alpha_dry_class3: 0.010,
    delta_alpha_night: [0, 0.005, 0.010, 0.015],
    delta_alpha_relief: -0.010
  },
  alpha: {
    alpha_max_global: 0.95,
    alpha_ref: [0.45,0.45,0.50,0.55,0.65,0.75,0.85,0.88,0.80,0.65,0.52,0.45]
  },
  washout: {
    enabled: true,
    thresholds_mm: [2,10,20,30],
    beta_values: [0.95,0.85,0.75,0.65]
  },
  wind: { w_mean_weight: 0.7, w_gust_weight: 0.3 },
  hdw_eff_params: {
    k_base: 10, k_mid: 20, k_high: 30,
    delta_rel_threshold: 0.20
  },
  foehn_winds: {
    enabled: false,
    delta_alpha_per_score_unit: 0.005,
    winds: []
  },
  soglie: {
    hdw_eff: {
      livelli: ["verde","giallo","arancio","rosso","viola"],
      colori: ["#4ade80","#facc15","#fb923c","#ef4444","#7c3aed"],
      etichette: ["Basso","Moderato","Alto","Molto alto","Estremo"],
      mensile: [
        [15,30,50,80,130],[15,30,50,80,130],[20,40,65,100,160],[25,50,80,120,190],
        [30,60,100,150,240],[40,80,130,200,320],[50,100,160,250,400],[55,110,175,270,430],
        [45,90,150,230,370],[30,60,100,150,240],[20,40,65,100,160],[15,30,50,80,130]
      ]
    },
    hdwc: {
      livelli: ["verde","giallo","arancio","rosso","viola"],
      colori: ["#4ade80","#facc15","#fb923c","#ef4444","#7c3aed"],
      etichette: ["Basso","Moderato","Alto","Molto alto","Estremo"],
      hdwc_peak: [80,150,250,400,600],
      mensile: [
        [30,70,130,220,380],[30,70,130,220,380],[40,90,170,280,470],[60,130,240,390,640],
        [100,210,370,580,920],[160,320,550,840,1280],[220,430,720,1080,1620],[240,470,780,1170,1740],
        [190,380,650,990,1510],[110,230,410,650,1020],[55,120,220,370,620],[35,80,150,250,420]
      ]
    }
  }
};

let activeSection = "meta";
let jsonVisible = false;
// Zone Manager state
let zmPkg = [];
let zmSelIdx = -1;
let zmSubTab = 'list';
let zmLeafletMap = null;
let zmLeafletLayers = { rects: [], corners: [] };
let zmValidationCache = {};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function set(section, key, value) {
  if (section === 'streak' && key === 'delta_alpha_night') {
    config.streak.delta_alpha_night = value;
  } else if (section === 'hdw_eff_params') {
    config.hdw_eff_params[key] = value;
  } else if (section === 'foehn_winds' && key !== 'winds') {
    config.foehn_winds[key] = value;
  } else {
    config[section][key] = value;
  }
  refresh();
}

function slider(id, label, min, max, step, section, key, unit="", hint="", docKey="") {
  const val = config[section][key];
  const badge = docKey ? _iBadge(docKey) : '';
  return `
  <div class="slider-field" id="sf-${id}">
    <div class="slider-header">
      <span class="slider-label">${label}${badge}</span>
      <div class="slider-value-wrapper">
        <span class="slider-value" id="sv-${id}">${val}${unit}</span>
        <input type="number" class="slider-number" id="sn-${id}" value="${val}" step="${step}" min="${min}" max="${max}"
          onchange="set('${section}','${key}',parseFloat(this.value));document.getElementById('sv-${id}').textContent=this.value+'${unit}';document.getElementById('sl-${id}').value=this.value">
      </div>
    </div>
    <input type="range" id="sl-${id}" min="${min}" max="${max}" step="${step}" value="${val}"
      oninput="document.getElementById('sn-${id}').value=this.value;document.getElementById('sv-${id}').textContent=this.value+'${unit}';set('${section}','${key}',parseFloat(this.value))">
    ${hint ? `<div class="slider-hint">${hint}</div>` : ''}
  </div>`;
}

function numInput(label, section, key, min, max, step, unit="", hint="", docKey="") {
  const val = config[section][key];
  const badge = docKey ? _iBadge(docKey) : '';
  return `
  <div class="field">
    <label>${label}${unit ? ' ('+unit+')' : ''}${badge}</label>
    <input type="number" min="${min}" max="${max}" step="${step}" value="${val}"
      onchange="set('${section}','${key}',parseFloat(this.value))">
    ${hint ? `<div class="hint">${hint}</div>` : ''}
  </div>`;
}

function textInput(label, section, key, placeholder="") {
  const val = config[section][key] || '';
  return `
  <div class="field">
    <label>${label}</label>
    <input type="text" value="${val.replace(/"/g, '&quot;')}" placeholder="${placeholder}"
      onchange="set('${section}','${key}',this.value)">
  </div>`;
}

function textareaInput(label, section, key, placeholder="") {
  const val = config[section][key] || '';
  return `
  <div class="field">
    <label>${label}</label>
    <textarea onchange="set('${section}','${key}',this.value)" placeholder="${placeholder}">${val}</textarea>
  </div>`;
}

function divider(title) {
  return `<div class="divider"><span>${title}</span></div>`;
}

// ─── SECTIONS ─────────────────────────────────────────────────────────────────
function sectionMeta() {
  const bb = config.meta.bbox || [null,null,null,null];
  const bv = i => (bb[i] != null && bb[i] !== '') ? bb[i] : '';
  const bboxSet = bb.some(v => v != null && v !== '');

  // Live preview string
  const preview = bboxSet
    ? `[${bb.map(v => v != null ? v : '?').join(', ')}]`
    : 'non definita — batch usa bbox hardcoded';

  return `
    ${textInput("Nome Preset","meta","preset_name","es. Portogallo Mediterraneo")}
    ${textInput("Region ID","meta","region_id","es. portugal_med")}
    ${textInput("Versione","meta","version","1.0.0")}
    ${textInput("Autore","meta","author","nome / team")}
    ${textareaInput("Note","meta","notes","")}
    ${divider("Bounding Box — rilevamento engine batch")}
    <div class="info-box" style="margin-bottom:14px">
      Formato: <b>[lonMin, lonMax, latMin, latMax]</b> ${_iBadge('meta.bbox')}<br>
      Stato: <span style="color:${bboxSet?'#16a34a':'#aaa'};font-weight:500">${preview}</span>
    </div>
    <div class="grid2" style="gap:8px;margin-bottom:8px">
      <div class="field">
        <label>Lon Min (°W neg)</label>
        <input type="number" step="0.1" min="-180" max="180" value="${bv(0)}" placeholder="-10"
          onchange="config.meta.bbox[0]=this.value!==''?parseFloat(this.value):null;refresh()">
      </div>
      <div class="field">
        <label>Lon Max (°E pos)</label>
        <input type="number" step="0.1" min="-180" max="180" value="${bv(1)}" placeholder="-5"
          onchange="config.meta.bbox[1]=this.value!==''?parseFloat(this.value):null;refresh()">
      </div>
      <div class="field">
        <label>Lat Min (°S neg)</label>
        <input type="number" step="0.1" min="-90" max="90" value="${bv(2)}" placeholder="36"
          onchange="config.meta.bbox[2]=this.value!==''?parseFloat(this.value):null;refresh()">
      </div>
      <div class="field">
        <label>Lat Max (°N pos)</label>
        <input type="number" step="0.1" min="-90" max="90" value="${bv(3)}" placeholder="43"
          onchange="config.meta.bbox[3]=this.value!==''?parseFloat(this.value):null;refresh()">
      </div>
    </div>
    ${bboxSet && bb[0]>=bb[1] ? `<div class="wind-warning">⚠ lonMin deve essere < lonMax</div>` : ''}
    ${bboxSet && bb[2]>=bb[3] ? `<div class="wind-warning">⚠ latMin deve essere < latMax</div>` : ''}`;
}

function sectionVegetation() {
  return `
    <div class="info-box" style="margin-bottom:18px">
      Questi parametri modificano la classificazione giornaliera quando i dati di
      umidità relativa sono disponibili (percorso orario o daily RH).
      Si attivano in <b>classifyDay_v2</b> indipendentemente dalla streak.
    </div>
    ${divider("Modificatori di classificazione")}
    ${slider("vh1","RH appassimento",20,60,1,"vegetation","RH_wilt","%","Forza dc≥2 quando rhMean ≤ soglia AND hdwEff ≥ HDW_c2×0.75","vegetation.RH_wilt")}
    ${slider("vv1","VPD stress",0.5,5,0.1,"vegetation","VPD_stress"," kPa","Promuove dc+1 quando VPD diurno ≥ soglia AND hdwEff ≥ HDW_c2×0.75","vegetation.VPD_stress")}
    ${divider("Memoria α")}
    ${slider("vd2","Giorni a stress grave",3,21,1,"vegetation","days_to_severe_stress"," gg","Soglia streak per il long-streak boost logaritmico di α","vegetation.days_to_severe_stress")}`;
}

function sectionClassification() {
  return `
    ${divider("Pioggia")}
    ${slider("cr1","Pioggia efficace",1,10,0.5,"classification","Rain_effective_mm"," mm","Sotto questa soglia la pioggia non resetta il sistema","classification.Rain_effective_mm")}
    ${divider("Soglie temperatura")}
    ${slider("ct1","Tmax → Classe 2",25,40,1,"classification","Tmax_class2","°C","","classification.Tmax_class2")}
    ${slider("ct2","Tmax → Classe 3",30,45,1,"classification","Tmax_class3","°C","","classification.Tmax_class3")}
    ${divider("Soglie HDW_eff")}
    ${slider("ch1","HDW_eff → Classe 2",20,150,5,"classification","HDW_eff_class2","","Soglia bassa = più giorni in classe 2","classification.HDW_eff_class2")}
    ${slider("ch2","HDW_eff → Classe 3",50,300,5,"classification","HDW_eff_class3","","","classification.HDW_eff_class3")}
    ${divider("Umidità relativa")}
    ${slider("crh1","RH secco",30,80,1,"classification","RH_dry","%","Doppio uso: classificazione diurna E modulatore secchezza notturna (night score +1)","classification.RH_dry")}
    ${slider("crh2","RH molto secco",15,60,1,"classification","RH_very_dry","%","Doppio uso: secchezza diurna severa E soglia VPD notturno per ns≥2 (percorso proxy)","classification.RH_very_dry")}`;
}

function sectionNight() {
  const sc = config.night;
  return `
    <div class="info-box" style="border-color:#3b82f6;background:#eff6ff;margin-bottom:18px">
      <span style="color:#1d4ed8;font-weight:600">Soglie RH notturne →</span>
      <span style="color:#1e40af"> Le soglie di umidità relativa notturna (RH_dry e RH_very_dry) sono condivise con la sezione
      <b>CLASSIFICAZIONE</b>. Lo stesso valore governa sia la classificazione diurna sia il modulatore
      di secchezza notturna che può elevare il night score di +1.
      Vai in CLASSIFICAZIONE → "RH secco" e "RH molto secco" per modificarle.</span>
    </div>
    ${divider("Soglie termiche notturne")}
    ${slider("nt1","Notte calda (score 1)",14,22,1,"night","T_night_warm","°C","","night.T_night_warm")}
    ${slider("nt2","Notte tropicale (score 2)",16,26,1,"night","T_night_tropical","°C","","night.T_night_tropical")}
    ${slider("nt3","Notte severa (score 3)",20,32,1,"night","T_night_severe","°C","","night.T_night_severe")}
    ${divider("Finestra notturna")}
    ${slider("nh1","Ore minime sopra soglia",1,8,1,"night","night_hours_min"," h","Ore notturne calde minime per attivare night_score","night.night_hours_min")}
    <div class="grid2">
      ${textInput("Inizio notte","night","night_window_start","es. 20:00")}
      ${textInput("Fine notte","night","night_window_end","es. 08:00")}
    </div>
    <div class="score-table" style="margin-top:16px">
      <div class="score-row"><div class="score-badge" style="color: #444">Score 0</div><div class="score-desc">Tmin &lt; ${sc.T_night_warm}°C — notte normale, recupero completo</div></div>
      <div class="score-row"><div class="score-badge" style="color: #d97706">Score 1</div><div class="score-desc">Tmin ≥ ${sc.T_night_warm}°C o ≥${sc.night_hours_min}h calde — notte calda</div></div>
      <div class="score-row"><div class="score-badge" style="color: #ea580c">Score 2</div><div class="score-desc">Tmin ≥ ${sc.T_night_tropical}°C o ≥${sc.night_hours_min}h ≥${sc.T_night_tropical}°C — tropicale</div></div>
      <div class="score-row" style="border-bottom:none"><div class="score-badge" style="color: #dc2626">Score 3</div><div class="score-desc">Tmin ≥ ${sc.T_night_severe}°C — notte severa, zero recupero</div></div>
    </div>`;
}

function sectionStreak() {
  const dn = config.streak.delta_alpha_night;
  return `
    <div class="info-box" style="margin-bottom:18px">
      <b>Comportamento del reset:</b> la streak si azzera sia con class 0 (pioggia ≥ Rain_effective_mm)
      sia con class 1 (giorno neutro). Dopo ogni reset riparte da zero: servono di nuovo
      <b>${config.streak.streak_activation_days} giorni</b> prima che Δα_dry si riattivi.
      Se piogge leggere e frequenti resettano la streak prima che si attivi, abbassare
      <b>Rain_effective_mm</b> in CLASSIFICAZIONE piuttosto che modificare questo parametro.
    </div>
    ${divider("Attivazione streak")}
    ${slider("ss1","Giorni attivazione streak",2,10,1,"streak","streak_activation_days"," gg","Giorni consecutivi classe 2/3 prima che α inizi a salire","streak.streak_activation_days")}
    ${divider("Incremento α da streak secco")}
    ${slider("sd1","Δα giorno classe 2",0,0.030,0.001,"streak","delta_alpha_dry_class2","","Incremento giornaliero di α in streak classe 2","streak.delta_alpha_dry_class2")}
    ${slider("sd2","Δα giorno classe 3",0,0.050,0.001,"streak","delta_alpha_dry_class3","","Incremento giornaliero di α in streak classe 3","streak.delta_alpha_dry_class3")}
    ${divider("Δα da night score [0–3]")}
    ${[0,1,2,3].map(i => `
    <div class="slider-field">
      <div class="slider-header">
        <span class="slider-label">Night score ${i}${i>0?_iBadge('streak.delta_alpha_night_'+i):''}</span>
        <div class="slider-value-wrapper">
          <span class="slider-value" id="sv-ns${i}">${dn[i]}</span>
          <input type="number" class="slider-number" id="sn-ns${i}" value="${dn[i]}" step="0.001" min="0" max="0.030"
            onchange="config.streak.delta_alpha_night[${i}]=parseFloat(this.value);document.getElementById('sv-ns${i}').textContent=this.value;document.getElementById('sl-ns${i}').value=this.value;refresh()">
        </div>
      </div>
      <input type="range" id="sl-ns${i}" min="0" max="0.030" step="0.001" value="${dn[i]}"
        oninput="document.getElementById('sn-ns${i}').value=this.value;document.getElementById('sv-ns${i}').textContent=this.value;config.streak.delta_alpha_night[${i}]=parseFloat(this.value);refresh()">
    </div>`).join('')}
    ${divider("Disagravamento")}
    ${slider("sr1","Δα classe 0 (relief)",-0.05,0,0.001,"streak","delta_alpha_relief","","Negativo: riduce α nei giorni di disagravamento","streak.delta_alpha_relief")}`;
}

function sectionAlpha() {
  const vals = config.alpha.alpha_ref;
  const mn = Math.min(...vals), mx = Math.max(...vals);

  const warns = [];
  for (let i = 0; i < 12; i++) {
    const j = (i+1)%12;
    const d = Math.abs(vals[i]-vals[j]);
    if (d > 0.15) warns.push(`${MONTHS[i]}→${MONTHS[j]}: Δ=${d.toFixed(2)} > 0.15`);
  }

  const bars = vals.map(v => {
    const pct = ((v - 0.30) / 0.65 * 100).toFixed(1);

  const cells = MONTHS.map((m,i) => `
    <div class="alpha-cell">

  return `
    ${divider("Alpha mensile regionale")}
    <div class="info-box">
      Il pavimento dinamico di α è <span class="hl">α_floor = min(alpha_ref)</span>.<br>
      Salti tra mesi consecutivi > 0.15 generano un avviso di calibrazione.

    ${slider("am1","Alpha max globale",0.80,0.99,0.01,"alpha","alpha_max_global","","Nessun α può superare questo valore","alpha.alpha_max_global")}`;

let soglieActiveTab = "hdwc";

function validateSoglie(rows) {
  const errors = [];
  rows.forEach((row, i) => {
    for (let j = 1; j < row.length; j++) {
      if (row[j] <= row[j-1]) errors.push(MONTHS[i] + ': livello ' + (j+1) + ' (' + row[j] + ') deve essere > livello ' + j + ' (' + row[j-1] + ')');
    }
  });
  return errors;
}

  const tab = soglieActiveTab;

  const peakSection = (tab === 'hdwc') ? (

      'onchange="config.soglie.hdwc.hdwc_peak[' + i + ']=parseFloat(this.value)||0;refresh()">' +

    ).join('') + '</div>'
  ) : '';

  const colorPickers = '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px">' +
    livelli.map((l,i) =>
      '<div>' +
      '<div style="font-size: 11px;color: #222;margin-bottom:4px;letter-spacing:0.08em;text-transform:uppercase">' + etichette[i] + '</div>' +
      '<input type="text" value="' + etichette[i] + '" ' +

      'onchange="config.soglie[\'' + tab + '\'].etichette[' + i + ']=this.value;refresh()">' +
      '<input type="color" value="' + colori[i] + '" ' +
      'style="width:100%;height:22px;border:none;border-radius:3px;cursor:pointer;margin-top:4px" ' +
      'onchange="config.soglie[\'' + tab + '\'].colori[' + i + ']=this.value;refresh()">' +

  return (
    '<div class="soglie-tabs">' +
    '<button class="soglie-tab ' + (tab==='hdwc'?'active':'') + '" onclick="soglieActiveTab=\'hdwc\';refresh()">HDWc cumulativo</button>' +
    '<button class="soglie-tab ' + (tab==='hdw_eff'?'active':'') + '" onclick="soglieActiveTab=\'hdw_eff\';refresh()">HDW_eff giornaliero</button>' +
    '</div>' +

    '<div class="soglie-legend" style="margin-bottom:12px">' + legend + '</div>' +

    (errors.length ?

      '<div class="validate-ok">Tutti i valori sono in ordine crescente</div>'
    ) +
    divider('Andamento stagionale per livello') +
    '<svg viewBox="0 0 100 32" style="width:100%;height:56px;overflow:visible;margin-bottom:4px">' + sparklines + '</svg>' +
    '<div style="display:flex;justify-content:space-between;font-size: 11px;color: #2d2d2d;margin-bottom:18px"><span>Gen</span><span>Apr</span><span>Lug</span><span>Ott</span><span>Dic</span></div>' +
    divider('Personalizza etichette e colori') +
    colorPickers
  );
}

// ─── SECTION: IMPORT α ERA5 ────────────────────────────────────────────────────
let _importedCalib = null;

// Named handler — avoids quote-escaping hell inside template literals
function _loadAlphaCalibFile(input) {
  const f = input.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!d.alpha_ref || !Array.isArray(d.alpha_ref) || d.alpha_ref.length !== 12)
        throw new Error('alpha_ref mancante o non ha 12 valori');
      _importedCalib = d;
      refresh();
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      const btn = document.querySelector('.nav-item[data-section="importalpha"]');
      if (btn) { btn.classList.add('active'); activeSection = 'importalpha'; refresh(); }
    } catch(err) { alert('File non valido: ' + err.message); }
  };
  r.readAsText(f);
  input.value = '';
}

function sectionImportAlpha() {
  const MONTHS = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  const hasData = _importedCalib != null;
  const meta = _importedCalib?.meta || {};

  let diffHTML = '';
  let warns = [];
  if (hasData) {
    const nA = _importedCalib.alpha_ref;
    const oA = config.alpha.alpha_ref;
    for (let i=0;i<11;i++) { const d=Math.abs(nA[i+1]-nA[i]); if(d>0.15) warns.push(MONTHS[i]+'→'+MONTHS[i+1]+': Δ='+d.toFixed(2)); }
    for (let i=3;i<8;i++) { if(nA[i+1]<nA[i]) warns.push('Inversione '+MONTHS[i]+'→'+MONTHS[i+1]); }
    const rows = nA.map((na,m) => {
      const oa=oA[m]; const d=na-oa;
      const ds=d===0?'=':(d>0?'+':'')+d.toFixed(2);
      const dc=d>0.001?'diff-up':d<-0.001?'diff-down':'diff-same';
      const cal=_importedCalib.calibration?.[m]||{};
      const sc=cal.source==='365d'?'src-365d':cal.source==='blended'?'src-blended':'src-global';
      const sl=cal.source==='365d'?'●365d':cal.source==='blended'?'◑mix':'?glb';
      return `<div class="import-diff-row">
        <span style="color:#555">${MONTHS[m]}</span>
        <span><b style="font-family:'DM Mono',monospace">${oa.toFixed(2)}</b>→<b style="font-family:'DM Mono',monospace;color:#E05A1E">${na.toFixed(2)}</b></span>
        <span class="${dc}" style="font-family:'DM Mono',monospace">${ds}</span>
        <span class="src-badge ${sc}">${sl}</span>
        <span style="color:#555;font-size:10px">E=${cal.e_hdwc??'—'}</span>
      </div>`;
    }).join('');
    diffHTML = `<div class="import-alpha-card">
      <div style="font-size:11px;font-weight:700;color:#15803d;margin-bottom:5px">✅ Calibrazione caricata</div>
      <div style="font-size:10px;color:#555;margin-bottom:8px">
        ${meta.location_name||'—'} · ${meta.lat?.toFixed(4)||'—'}, ${meta.lon?.toFixed(4)||'—'}<br>
        Periodo: ${meta.period||'—'} · ${meta.n_months_local||0}/12 mesi ERA5 locali
      </div>
      <div style="font-weight:700;font-size:11px;color:#333;margin-bottom:5px">Diff α_ref: attuale → ERA5</div>
      <div class="import-diff-row" style="font-size:10px;color:#777;font-weight:700;border-bottom:2px solid #e8e4de">
        <span>Mese</span><span>α old→new</span><span>Δ</span><span>Fonte</span><span>E[HDWc]</span>
      </div>${rows}</div>
    ${warns.length?`<div class="warn-box"><div class="warn-title">⚠ Avvisi</div>${warns.map(w=>'<div class="warn-item">· '+w+'</div>').join('')}</div>`:'<div class="validate-ok">✅ Curva α valida</div>'}
    <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="_applyImportedAlpha()">✓ Applica α ERA5 calibrati</button>`;
  }

  return `<div class="info-box">Importa il JSON <b>alpha_calib_*.json</b> esportato dal dashboard FireMeteo
    (bottone <b>Export α calibrati</b> nel pannello α Sensitivity dopo aver caricato ERA5 365d).<br>
    Aggiorna automaticamente <b>alpha_ref</b> con valori calibrati localmente. Ideale per calibrare preset per <b>ecoregioni specifiche</b>.</div>
  ${divider('Carica file calibrazione ERA5')}
  <div style="margin-bottom:14px">
    <input type="file" id="alphaCalibFileInput" accept=".json" style="display:none"
      onchange="_loadAlphaCalibFile(this)">
    <button class="btn btn-ghost" style="width:100%;text-align:center"
      onclick="document.getElementById('alphaCalibFileInput').click()">
      📡 Scegli alpha_calib_*.json
    </button>
  </div>
  ${hasData?diffHTML:'<div class="info-box" style="color:#777;text-align:center">Nessun file caricato.</div>'}`;
}

function _applyImportedAlpha() {
  if(!_importedCalib)return;
  config.alpha.alpha_ref=_importedCalib.alpha_ref.slice();
  const loc=_importedCalib.meta?.location_name;
  if(loc) config.meta.notes=(config.meta.notes?config.meta.notes+'\n':'')+
    'α calibrati ERA5: '+loc+' ('+(_importedCalib.meta?.period||'')+')';
  _importedCalib=null;refresh();
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  const btn=document.querySelector('.nav-item[data-section="alpha"]');
  if(btn){btn.classList.add('active');activeSection='alpha';refresh();}
}

// ─── SECTION: VENTI DOMINANTI (foehn_winds) ───────────────────────────────────
const COMPASS_16 = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];

function compassOpts(selected) {
  return COMPASS_16.map(d => `<option value="${d}"${d===selected?' selected':''}>${d}</option>`).join('');
}

function _windCardHTML(w, idx) {
  return `
  <div class="wind-card" id="wcard-${idx}">
    <div class="wind-card-hdr">
      <span class="wind-card-title">Vento ${idx+1}${w.label ? ' · ' + w.label : ''}</span>
      <button class="wind-card-remove" onclick="_removeWind(${idx})">✕ rimuovi</button>
    </div>
    <div class="wind-grid">
      <div class="wind-field" style="grid-column:1/-1">
        <label>Etichetta</label>
        <input type="text" value="${w.label||''}" placeholder="es. Maestrale"
          onchange="config.foehn_winds.winds[${idx}].label=this.value;refresh()">
      </div>
      <div class="wind-field">
        <label>Direzione DA</label>
        <select onchange="config.foehn_winds.winds[${idx}].from=this.value;refresh()">
          ${compassOpts(w.from||'N')}
        </select>
      </div>
      <div class="wind-field">
        <label>Direzione A</label>
        <select onchange="config.foehn_winds.winds[${idx}].to=this.value;refresh()">
          ${compassOpts(w.to||'N')}
        </select>
      </div>
      <div class="wind-field">
        <label>Score (1–5)</label>
        <input type="number" min="1" max="5" step="1" value="${w.score||2}"
          onchange="config.foehn_winds.winds[${idx}].score=parseInt(this.value)||1;refresh()">
      </div>
      <div class="wind-field">
        <label>Velocità min (km/h)</label>
        <input type="number" min="0" max="200" step="5" value="${w.min_speed_kmh||30}"
          onchange="config.foehn_winds.winds[${idx}].min_speed_kmh=parseFloat(this.value)||0;refresh()">
      </div>
    </div>
    <div style="margin-top:8px;font-size:11px;color:#555">
      Δα per evento =
      <b style="color:#E05A1E">${(config.foehn_winds.delta_alpha_per_score_unit*(w.score||2)).toFixed(3)}</b>
      (score ${w.score||2} × ${config.foehn_winds.delta_alpha_per_score_unit})
    </div>
  </div>`;
}

function _addWind() {
  if (config.foehn_winds.winds.length >= 4) return;
  config.foehn_winds.winds.push({ label:'', from:'NW', to:'NNW', score:2, min_speed_kmh:30 });
  refresh();
}

function _removeWind(idx) {
  config.foehn_winds.winds.splice(idx, 1);
  refresh();
}

function sectionFoehn() {
  const fw = config.foehn_winds;
  const enabled = fw.enabled;
  const windCards = fw.winds.map((w,i) => _windCardHTML(w,i)).join('');
  const canAdd = fw.winds.length < 4;

  return `
    ${divider('Attivazione')}
    <div class="toggle-row">
      <button class="toggle-btn" onclick="config.foehn_winds.enabled=!config.foehn_winds.enabled;refresh()"
        style="background:${enabled?'#E05A1E':'#ddd'}">
        <div class="toggle-knob" style="left:${enabled?'25px':'3px'}"></div>
      </button>
      <div>
        <div class="toggle-label">Venti dominanti pericolosi abilitati</div>
        <div class="toggle-hint">Aggiunge Δα quando il vento dominante corrisponde a un pattern configurato</div>
      </div>
    </div>
    ${enabled ? `
    <div class="info-box" style="margin-bottom:16px">
      In caso di <b>match multiplo</b> vince il vento con score più alto.<br>
      La velocità vento in Open-Meteo/ERA5 è in <b>m/s</b> → convertita in km/h (×3.6) prima del confronto.<br>
      Il match direzionale gestisce il wrap-around a 360°.<br>
      Se <code>foehn_winds</code> è assente nel JSON, il motore lo ignora silenziosamente.
    </div>
    ${divider('Δα per unità di score')}` +
    slider('fw1','Δα / score unit',0,0.020,0.001,'foehn_winds','delta_alpha_per_score_unit','',
      'Es. score=3 → Δα = 3 × questo valore','foehn_winds.delta_alpha_per_score_unit') +
    `${divider('Lista venti (max 4)')}
    ${windCards}
    <button class="add-wind-btn" onclick="_addWind()" ${!canAdd?'disabled':''}>
      + aggiungi vento ${!canAdd?'(max 4 raggiunto)':''}
    </button>
    ` : `
    <div class="info-box" style="color:#777;margin-top:12px">
      Abilitare il toggle per configurare i venti dominanti pericolosi (Maestrale, Scirocco, Föhn, ecc.).<br>
      Se disabilitato, il campo <code>foehn_winds.enabled = false</code> viene incluso nel JSON
      e il motore lo ignora senza errori.
    </div>`}`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderSection() {
  const map = {
    meta: sectionMeta, vegetation: sectionVegetation,
    classification: sectionClassification, night: sectionNight,
    streak: sectionStreak, alpha: sectionAlpha,
    washout: sectionWashout, wind: sectionWind,
    importalpha: sectionImportAlpha,
    hdweff: sectionHdwEff, foehn: sectionFoehn,
    soglie: sectionSoglie
  };
  return map[activeSection] ? map[activeSection]() : '';
}

function _configForExport() {
  const out = JSON.parse(JSON.stringify(config));
  if (!out.meta.bbox || out.meta.bbox.every(v => v == null))
    delete out.meta.bbox;
  return out;
}

function refresh() {
  if (activeSection === 'zonemgr') { _refreshZmSection(); return; }
  document.getElementById('content-inner').classList.remove('zm-wide');

  // ── Zona edit banner ─────────────────────────────────────────────────────
  const contentEl = document.getElementById('content');
  let bannerEl = document.getElementById('zm-edit-banner');
  if (zmSelIdx >= 0 && zmPkg.length > 0) {
    const zoneName = config.meta.preset_name || zmPkg[zmSelIdx]?.meta?.preset_name || '—';
    const bannerHTML = `
      <span class="banner-label">Editing zona</span>
      <span class="banner-name" title="${zoneName}">${zoneName}</span>
      <span class="banner-slot">${zmSelIdx+1} / ${zmPkg.length}</span>
      <button class="banner-save-btn" id="zm-banner-save" onclick="zmSaveSlot()">💾 Salva nel pacchetto</button>
      <button class="banner-back-btn" onclick="zmSaveAndBack()">← Zone Manager</button>`;
    if (!bannerEl) {
      bannerEl = document.createElement('div');
      bannerEl.id = 'zm-edit-banner';
      contentEl.insertBefore(bannerEl, document.getElementById('content-inner'));
    }
    bannerEl.innerHTML = bannerHTML;
  } else {
    if (bannerEl) bannerEl.remove();
  }

  // Content
  const label = document.querySelector(`.nav-item[data-section="${activeSection}"]`)?.textContent.trim() || '';
  document.getElementById('content-inner').innerHTML = `
    <div class="section-label">${label}</div>
    ${renderSection()}`;

  // JSON
  const j = JSON.stringify(_configForExport(), null, 2);
  document.getElementById('json-pre').textContent = j;
  document.getElementById('json-chars').textContent = j.length + ' chars';

  // Footer
  const alphaMin = Math.min(...config.alpha.alpha_ref);
  document.getElementById('footer-left').textContent =
    `HDWC ENGINE · α_floor = ${alphaMin.toFixed(2)} · streak_activation = ${config.streak.streak_activation_days}gg`;
  document.getElementById('footer-right').textContent =
    `washout ${config.washout.enabled?'ON':'OFF'} · W_eff = ${config.wind.w_mean_weight}·mean+${config.wind.w_gust_weight}·gust · k=${config.hdw_eff_params.k_base}/${config.hdw_eff_params.k_mid}/${config.hdw_eff_params.k_high} · venti ${config.foehn_winds.enabled?config.foehn_winds.winds.length+'':'OFF'}`;

  // Brand
  let brandSuffix = config.meta.preset_name || '—';
  if (zmSelIdx >= 0 && zmPkg.length > 0) brandSuffix += ` [zona ${zmSelIdx+1}/${zmPkg.length}]`;
  document.getElementById('brand-sub').textContent = `REGIONAL PRESET BUILDER v8.0 · ${brandSuffix}`;
}

document.getElementById('import-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);

      // ── 1. Shallow merge delle sezioni top-level ──────────────────────────
      config = { ...config, ...parsed };

      // ── 2. Deep merge soglie: preserva livelli/colori (campi esclusivi del
      //       Builder, assenti nei JSON esportati dal dashboard) ─────────────
      const DEFAULT_SOGLIE_SHARED = {
        livelli:   ['verde','giallo','arancio','rosso','viola'],
        colori:    ['#4ade80','#facc15','#fb923c','#ef4444','#7c3aed'],
        etichette: ['Basso','Moderato','Alto','Molto alto','Estremo'],
      };
      ['hdwc', 'hdw_eff'].forEach(tab => {
        const src = parsed.soglie?.[tab];
        if (!src) return;
        config.soglie[tab] = {
          ...DEFAULT_SOGLIE_SHARED,
          ...config.soglie[tab],
          livelli:   DEFAULT_SOGLIE_SHARED.livelli,
          colori:    src.colori   || DEFAULT_SOGLIE_SHARED.colori,
          etichette: src.etichette || DEFAULT_SOGLIE_SHARED.etichette,
        };
      });

      // ── 3. Normalizza campi opzionali assenti nei JSON del dashboard ───────
      config.meta.notes               = config.meta.notes               ?? '';
      config.meta.created             = config.meta.created             || new Date().toISOString().slice(0,10);
      config.meta.bbox                = Array.isArray(parsed.meta?.bbox) && parsed.meta.bbox.length === 4
                                        ? parsed.meta.bbox
                                        : [null, null, null, null];
      config.night.night_window_start = config.night.night_window_start || '20:00';
      config.night.night_window_end   = config.night.night_window_end   || '08:00';

      // ── 3b. Normalizza hdw_eff_params (nuovo v15) ─────────────────────────
      const _defHp = { k_base:10, k_mid:20, k_high:30, delta_rel_threshold:0.20 };
      config.hdw_eff_params = { ..._defHp, ...(parsed.hdw_eff_params || {}) };

      // ── 3c. Normalizza foehn_winds (nuovo v15) ────────────────────────────
      if (parsed.foehn_winds) {
        config.foehn_winds = {
          enabled: parsed.foehn_winds.enabled ?? false,
          delta_alpha_per_score_unit: parsed.foehn_winds.delta_alpha_per_score_unit ?? 0.005,
          winds: Array.isArray(parsed.foehn_winds.winds) ? parsed.foehn_winds.winds.map(w => ({
            label: w.label || '',
            from:  w.from  || 'N',
            to:    w.to    || 'N',
            score: typeof w.score === 'number' ? w.score : 2,
            min_speed_kmh: typeof w.min_speed_kmh === 'number' ? w.min_speed_kmh : 30,
          })) : []
        };
      } else {
        config.foehn_winds = { enabled: false, delta_alpha_per_score_unit: 0.005, winds: [] };
      }

            // ── 4. Notifica e render ───────────────────────────────────────────────
      zmSelIdx = -1; // import diretto: nessuna zona del pacchetto attiva
      refresh();
      // Salta automaticamente alla sezione SOGLIE MENSILI dopo l'import
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      const soglieBtn = document.querySelector('.nav-item[data-section="soglie"]');
      if (soglieBtn) { soglieBtn.classList.add('active'); activeSection = 'soglie'; refresh(); }

    } catch(err) {
      alert('JSON non valido o struttura non compatibile:\n' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
refresh();

function _zmNormalize(raw) {
  const def = _zmDefaultConfig();
  const out = { ...def, ...raw };
  const D_SOGLIE = { livelli:['verde','giallo','arancio','rosso','viola'], colori:['#4ade80','#facc15','#fb923c','#ef4444','#7c3aed'], etichette:['Basso','Moderato','Alto','Molto alto','Estremo'] };
  ['hdwc','hdw_eff'].forEach(tab => {
    const src = raw.soglie?.[tab];
    if (src) {
      out.soglie[tab] = { ...D_SOGLIE, ...out.soglie[tab], livelli: D_SOGLIE.livelli, colori: src.colori||D_SOGLIE.colori, etichette: src.etichette||D_SOGLIE.etichette };
      if (src.mensile) out.soglie[tab].mensile = src.mensile;
      if (src.hdwc_peak) out.soglie[tab].hdwc_peak = src.hdwc_peak;
    }
  });
  out.meta = { ...def.meta, ...(raw.meta||{}) };
  out.meta.notes = out.meta.notes ?? '';
  out.meta.created = out.meta.created || new Date().toISOString().slice(0,10);
  out.meta.bbox = Array.isArray(raw.meta?.bbox) && raw.meta.bbox.length===4 ? raw.meta.bbox : [null,null,null,null];
  out.night = { ...def.night, ...(raw.night||{}) };
  out.night.night_window_start = out.night.night_window_start || '20:00';
  out.night.night_window_end = out.night.night_window_end || '08:00';
  out.hdw_eff_params = { ...def.hdw_eff_params, ...(raw.hdw_eff_params||{}) };
  if (raw.foehn_winds) {
    out.foehn_winds = {
      enabled: raw.foehn_winds.enabled ?? false,
      delta_alpha_per_score_unit: raw.foehn_winds.delta_alpha_per_score_unit ?? 0.005,
      winds: Array.isArray(raw.foehn_winds.winds) ? raw.foehn_winds.winds.map(w=>({
        label:w.label||'', from:w.from||'N', to:w.to||'N',
        score:typeof w.score==='number'?w.score:2,
        min_speed_kmh:typeof w.min_speed_kmh==='number'?w.min_speed_kmh:30
      })) : []
    };
  }
  return out;
}

function zmParsePkg(json) {
  if (Array.isArray(json)) return json.map(_zmNormalize);
  if (typeof json === 'object' && json !== null) {
    const vals = Object.values(json);
    if (vals.length > 0 && vals[0] && vals[0].meta) return vals.map(_zmNormalize);
    if (json.meta) return [_zmNormalize(json)]; // Mode C single
  }
  return [];
}

function zmValidate(z) {
  const errs = [];
  const a = z.alpha?.alpha_ref || [];
  for (let i=0;i<11;i++) {
    const d = Math.abs((a[i+1]||0)-(a[i]||0));
    if (d > 0.151) errs.push(`α Δ${d.toFixed(2)} ${MONTHS[i]}→${MONTHS[i+1]}`);
  }
  ['hdw_eff','hdwc'].forEach(tab => {
    (z.soglie?.[tab]?.mensile||[]).forEach((row,m) => {
      for (let i=0;i<row.length-1;i++) if (row[i]>=row[i+1]) errs.push(`${tab} ${MONTHS[m]}: col${i+1}≥col${i+2}`);
    });
  });
  const bb = z.meta?.bbox;
  if (bb && Array.isArray(bb) && bb.some(v=>v!=null)) {
    if (bb.some(v=>v==null||isNaN(v))) errs.push('bbox: valori mancanti');
    else {
      if (bb[0]>=bb[1]) errs.push('bbox: lonMin≥lonMax');
      if (bb[2]>=bb[3]) errs.push('bbox: latMin≥latMax');
    }
  }
  return errs;
}

function zmSaveCurrentToSlot() {
  if (zmSelIdx >= 0 && zmSelIdx < zmPkg.length) {
    zmPkg[zmSelIdx] = JSON.parse(JSON.stringify(_configForExport()));
    zmValidationCache[zmSelIdx] = zmValidate(zmPkg[zmSelIdx]);
  }
}

function zmLoadZone(idx) {
  zmSaveCurrentToSlot();
  zmSelIdx = idx;
  const z = zmPkg[idx];
  // Apply into editor config (same as import handler)
  config = JSON.parse(JSON.stringify(z));
  const D_SOGLIE = { livelli:['verde','giallo','arancio','rosso','viola'], colori:['#4ade80','#facc15','#fb923c','#ef4444','#7c3aed'], etichette:['Basso','Moderato','Alto','Molto alto','Estremo'] };
  ['hdwc','hdw_eff'].forEach(tab => {
    if (!config.soglie) config.soglie = {};
    if (!config.soglie[tab]) config.soglie[tab] = JSON.parse(JSON.stringify(config.soglie[tab]||{}));
    config.soglie[tab] = { ...D_SOGLIE, ...config.soglie[tab], livelli: D_SOGLIE.livelli };
  });
  config.meta.notes = config.meta.notes ?? '';
  config.meta.created = config.meta.created || new Date().toISOString().slice(0,10);
  config.meta.bbox = Array.isArray(z.meta?.bbox) && z.meta.bbox.length===4 ? z.meta.bbox : [null,null,null,null];
  config.night.night_window_start = config.night.night_window_start || '20:00';
  config.night.night_window_end = config.night.night_window_end || '08:00';
  config.hdw_eff_params = { k_base:10, k_mid:20, k_high:30, delta_rel_threshold:0.20, ...(z.hdw_eff_params||{}) };
  if (!config.foehn_winds) config.foehn_winds = { enabled:false, delta_alpha_per_score_unit:0.005, winds:[] };
  // Navigate to meta section in editor
  activeSection = 'meta';
  document.getElementById('content-inner').classList.remove('zm-wide');
  document.querySelectorAll('.nav-item[data-section]').forEach(b => {
    b.classList.toggle('active', b.dataset.section==='meta');
  });
  refresh();
}

function zmAddEmpty() {
  zmSaveCurrentToSlot();
  const z = _zmDefaultConfig();
  z.meta.preset_name = 'Nuova Zona ' + (zmPkg.length + 1);
  z.meta.region_id = 'new_zone_' + (zmPkg.length + 1);
  zmPkg.push(z);
  zmValidationCache[zmPkg.length-1] = zmValidate(z);
  zmLoadZone(zmPkg.length - 1);
}

function zmCloneZone(idx) {
  zmSaveCurrentToSlot();
  const clone = JSON.parse(JSON.stringify(zmPkg[idx]));
  clone.meta.preset_name = clone.meta.preset_name + ' (copia)';
  clone.meta.region_id = clone.meta.region_id + '_copy';
  zmPkg.splice(idx+1, 0, clone);
  zmValidationCache = {};
  zmPkg.forEach((z,i) => { zmValidationCache[i] = zmValidate(z); });
  if (zmSelIdx > idx) zmSelIdx++;
  _refreshZmSection();
}

function zmDeleteZone(idx) {
  if (!confirm('Eliminare la zona "' + (zmPkg[idx]?.meta?.preset_name||'?') + '"?')) return;
  zmPkg.splice(idx, 1);
  zmValidationCache = {};
  zmPkg.forEach((z,i) => { zmValidationCache[i] = zmValidate(z); });
  if (zmSelIdx === idx) zmSelIdx = zmPkg.length > 0 ? Math.max(0, idx-1) : -1;
  else if (zmSelIdx > idx) zmSelIdx--;
  _refreshZmSection();
}

function zmMoveZone(idx, dir) {
  zmSaveCurrentToSlot();
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= zmPkg.length) return;
  [zmPkg[idx], zmPkg[newIdx]] = [zmPkg[newIdx], zmPkg[idx]];
  if (zmSelIdx === idx) zmSelIdx = newIdx;
  else if (zmSelIdx === newIdx) zmSelIdx = idx;
  _refreshZmSection();
}

function zmRenameField(idx, field, value) {
  zmPkg[idx].meta[field] = value;
  if (zmSelIdx === idx) config.meta[field] = value;
}

function zmFromTemplate(name) {
  if (!name) return;
  const tpl = ZM_TEMPLATES[name];
  if (!tpl) return;
  zmSaveCurrentToSlot();
  const z = _zmNormalize(tpl);
  zmPkg.push(z);
  zmValidationCache[zmPkg.length-1] = zmValidate(z);
  zmLoadZone(zmPkg.length - 1);
}

function zmExportPkg() {
  zmSaveCurrentToSlot();
  const errsAll = zmPkg.flatMap((z,i) => {
    const e = zmValidate(z);
    return e.map(msg => `Zona ${i+1} (${z.meta?.preset_name||'?'}): ${msg}`);
  });
  if (errsAll.length > 0) {
    if (!confirm('Validazione: ' + errsAll.length + ' avvisi.\n\n' + errsAll.slice(0,5).join('\n') + '\n\nEsportare comunque?')) return;
  }
  const blob = new Blob([JSON.stringify(zmPkg, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'hdwc_package_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
}

function zmExportZone(idx) {
  zmSaveCurrentToSlot();
  const z = zmPkg[idx];
  const errs = zmValidate(z);
  if (errs.length > 0) {
    if (!confirm('Validazione: ' + errs.join('; ') + '\n\nEsportare comunque?')) return;
  }
  const blob = new Blob([JSON.stringify(z, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'hdwc_preset_' + (z.meta?.region_id||'zone') + '.json';
  a.click(); URL.revokeObjectURL(url);
}

function sectionZoneMgr() {
  const tplOpts = ['<option value="">+ da template geografico…</option>',
    ...Object.keys(ZM_TEMPLATES).map(k => `<option value="${k.replace(/"/g,'&quot;')}">${k}</option>`)
  ].join('');

  const listHTML = _zmRenderList();

        }

       </div>`;

  const mapHTML = `
    <div class="zm-map-hint">
      Ogni zona con bbox valida è visualizzata come rettangolo colorato.
      Click sul rettangolo → carica nell'editor. Corner handles trascinabili → aggiornano la bbox live.
    </div>
    ${drawPanel}

  return `
    <div class="zm-toolbar">
      <span class="zm-pkg-count">${zmPkg.length} zona${zmPkg.length!==1?'e':''} nel pacchetto</span>
      <select class="zm-tpl-select" onchange="zmFromTemplate(this.value);this.value=''" title="Crea nuova zona da template climatico precompilato">
        ${tplOpts}
      </select>
    </div>
    <div class="zm-subtabs">
      <button class="zm-subtab${zmSubTab==='list'?' active':''}" onclick="zmSubTab='list';_refreshZmSection()">▤ LISTA ZONE</button>
      <button class="zm-subtab${zmSubTab==='map'?' active':''}" onclick="zmSubTab='map';_refreshZmSection()">🗺 MAPPA BBOX</button>
    </div>
    ${zmSubTab==='list' ? listHTML : mapHTML}
    <div class="zm-export-row">
      <button class="btn btn-ghost" onclick="zmAddEmpty()">+ Aggiungi vuota</button>
      <button class="btn btn-ghost" onclick="document.getElementById('zm-add-file').click()" title="Selezione multipla supportata">📂 Aggiungi da file…</button>
      <button class="btn btn-ghost" onclick="document.getElementById('zm-pkg-file').click()">📦 Carica pacchetto</button>

    </div>`;
}

function _zmBboxStr(bb) {
  if (!bb || !Array.isArray(bb) || bb.every(v=>v==null)) return '—';
  return '[' + bb.map(v=>v!=null?v:'?').join(',') + ']';
}

function _zmRenderList() {
  if (zmPkg.length === 0) {
    return `<div class="zm-empty">
      Nessuna zona caricata.<br>
      Carica un pacchetto con <b>📦 Carica pacchetto</b> oppure aggiungi zone vuote o da template.
    </div>`;
  }

  const rows = zmPkg.map((z, i) => {
    const errs = zmValidationCache[i] || (zmValidationCache[i] = zmValidate(z));
    const isValid = errs.length === 0;
    const isSel = i === zmSelIdx;
    const validBadge = isValid
      ? `<span class="zm-valid-ok" title="Valido">✓</span>`
      : `<span class="zm-valid-warn" title="${errs.join('&#10;')}"title="⚠ ${errs.length} err">⚠${errs.length}</span>`;
    const name = z.meta?.preset_name || '—';
    const rid = z.meta?.region_id || '—';
    const bb = _zmBboxStr(z.meta?.bbox);
    return `<div class="zm-zone-row${isSel?' selected':''}" id="zmrow-${i}">
      <div class="zm-zone-cell">
        <input class="zm-inline-edit" value="${name.replace(/"/g,'&quot;')}" title="Rinomina preset_name"
          oninput="zmRenameField(${i},'preset_name',this.value)"
          onclick="event.stopPropagation()">
      </div>
      <div class="zm-zone-cell">
        <input class="zm-inline-edit zm-zone-id" value="${rid.replace(/"/g,'&quot;')}" title="Rinomina region_id"
          oninput="zmRenameField(${i},'region_id',this.value)"
          onclick="event.stopPropagation()">
      </div>
      <div class="zm-zone-cell zm-zone-bbox" title="${bb}">${bb}</div>
      <div class="zm-zone-cell" style="text-align:center">${validBadge}</div>
      <div class="zm-ops">
        <button class="zm-op-btn" title="Carica nell'editor" onclick="zmLoadZone(${i})">✎</button>
        <button class="zm-op-btn" title="Clona" onclick="zmCloneZone(${i})">⎘</button>
        <button class="zm-op-btn" title="Esporta zona" onclick="zmExportZone(${i})">↓</button>
        <button class="zm-op-btn" title="Su" onclick="zmMoveZone(${i},-1)" ${i===0?'disabled':''}>↑</button>
        <button class="zm-op-btn" title="Giù" onclick="zmMoveZone(${i},1)" ${i===zmPkg.length-1?'disabled':''}>↓</button>
        <button class="zm-op-btn danger" title="Elimina" onclick="zmDeleteZone(${i})">✕</button>
      </div>
    </div>`;
  }).join('');

  const totalErrs = zmPkg.reduce((n,_,i) => n + (zmValidationCache[i]?.length||0), 0);
  const errBlock = totalErrs > 0
    ? `<div class="zm-err-list">⚠ ${totalErrs} avviso${totalErrs!==1?'i':''} di validazione nel pacchetto.
       Esportare comunque è possibile, il sistema chiederà conferma.</div>` : '';

  return errBlock + `
    <div class="zm-zone-list">
      <div class="zm-zone-row zm-header">
        <div class="zm-zone-cell">Preset name</div>
        <div class="zm-zone-cell">Region ID</div>
        <div class="zm-zone-cell">Bbox</div>
        <div class="zm-zone-cell" style="text-align:center">Val.</div>
        <div class="zm-zone-cell">Azioni</div>
      </div>
      ${rows}
    </div>`;
}

// ─── LEAFLET MAP ──────────────────────────────────────────────────────────────

const ZM_COLORS = ['#E05A1E','#3b82f6','#16a34a','#7c3aed','#dc2626','#0891b2','#d97706','#be185d',
  '#65a30d','#6366f1','#0d9488','#9333ea','#ea580c'];

function zmInitMap() {
  const el = document.getElementById('zm-map');
  if (!el) return;
  if (!window.L) { el.innerHTML = '<div style="padding:20px;color:#999">Leaflet non disponibile.</div>'; return; }

  if (zmLeafletMap) { zmLeafletMap.remove(); zmLeafletMap = null; }
  zmLeafletLayers = { rects: [], corners: [] };

  zmLeafletMap = L.map('zm-map', { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 18, subdomains: 'abcd'
  }).addTo(zmLeafletMap);

  const bounds = [];

  zmPkg.forEach((z, idx) => {
    const bb = z.meta?.bbox;
    if (!bb || !Array.isArray(bb) || bb.length!==4 || bb.some(v=>v==null||isNaN(v))) return;
    const [lonMin, lonMax, latMin, latMax] = bb;
    if (lonMin>=lonMax || latMin>=latMax) return;

    const color = ZM_COLORS[idx % ZM_COLORS.length];
    const leafletBounds = [[latMin, lonMin],[latMax, lonMax]];

    const rect = L.rectangle(leafletBounds, {
      color: color, weight: 2, fillColor: color, fillOpacity: zmSelIdx===idx ? 0.25 : 0.12
    }).addTo(zmLeafletMap);

    const label = L.divIcon({
      html: `<div style="background:${color};color:#fff;padding:2px 6px;border-radius:3px;font-family:'DM Mono',monospace;font-size:11px;white-space:nowrap;opacity:0.9">${z.meta?.preset_name||idx+1}</div>`,
      className: '', iconAnchor: [0,0]
    });
    L.marker([(latMin+latMax)/2, (lonMin+lonMax)/2], { icon: label, interactive: false }).addTo(zmLeafletMap);

    rect.on('click', () => zmLoadZone(idx));
    rect.bindTooltip(`<b>${z.meta?.preset_name||'?'}</b><br>${z.meta?.region_id||''}<br>bbox: ${_zmBboxStr(bb)}`, { sticky: true });

    bounds.push(leafletBounds);

    // Corner handles
    const corners = [
      { lat: latMin, lng: lonMin, corners: [2, 0] },
      { lat: latMin, lng: lonMax, corners: [2, 1] },
      { lat: latMax, lng: lonMin, corners: [3, 0] },
      { lat: latMax, lng: lonMax, corners: [3, 1] }
    ];

    corners.forEach(({ lat, lng, corners: [latIdx, lonIdx] }) => {
      const cIcon = L.divIcon({
        html: `<div style="width:10px;height:10px;background:${color};border:2px solid #fff;border-radius:2px;cursor:crosshair"></div>`,
        className: '', iconSize: [10,10], iconAnchor: [5,5]
      });
      const m = L.marker([lat, lng], { icon: cIcon, draggable: true }).addTo(zmLeafletMap);
      m.on('drag', function(e) {
        const { lat: nlat, lng: nlng } = e.target.getLatLng();
        zmPkg[idx].meta.bbox[latIdx] = parseFloat(nlat.toFixed(4));
        zmPkg[idx].meta.bbox[lonIdx] = parseFloat(nlng.toFixed(4));
        if (zmSelIdx === idx) config.meta.bbox[latIdx] = zmPkg[idx].meta.bbox[latIdx];
        if (zmSelIdx === idx) config.meta.bbox[lonIdx] = zmPkg[idx].meta.bbox[lonIdx];
        const bb2 = zmPkg[idx].meta.bbox;
        rect.setBounds([[bb2[2],bb2[0]],[bb2[3],bb2[1]]]);
      });
      m.on('dragend', () => {
        zmValidationCache[idx] = zmValidate(zmPkg[idx]);
      });
      zmLeafletLayers.corners.push(m);
    });
    zmLeafletLayers.rects.push(rect);
  });

  if (bounds.length > 0) {
    const allBounds = bounds.reduce((acc, b) => acc ? acc.extend(b) : L.latLngBounds(b), null);
    if (allBounds && allBounds.isValid()) zmLeafletMap.fitBounds(allBounds, { padding: [30,30] });
  } else {
    zmLeafletMap.setView([20, 10], 2);
  }
}

document.getElementById('zm-add-file').addEventListener('change', e => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  let loaded = 0, added = 0;
  const errors = [];
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      loaded++;
      try {
        const zones = zmParsePkg(JSON.parse(ev.target.result));
        if (!zones.length) { errors.push(file.name + ': nessuna zona riconosciuta'); }
        else { zones.forEach(z => { zmPkg.push(z); zmValidationCache[zmPkg.length-1] = zmValidate(z); }); added += zones.length; }
      } catch(err) { errors.push(file.name + ': ' + err.message); }
      if (loaded === files.length) {
        if (errors.length) alert('Avvisi:\n' + errors.join('\n'));
        if (added > 0) {
          activeSection = 'zonemgr'; zmSubTab = 'list';
          document.querySelectorAll('.nav-item[data-section]').forEach(b => b.classList.toggle('active', b.dataset.section==='zonemgr'));
          document.getElementById('content-inner').classList.add('zm-wide');
          document.getElementById('content-inner').innerHTML = `<div class="section-label">📦 ZONE MANAGER</div>${sectionZoneMgr()}`;
        }
      }
    };
    reader.readAsText(file);
  });
  e.target.value = '';
});

// ── FIX: BBOX DRAW TOOL ───────────────────────────────────────────────────────
let zmDrawMode = false;
let zmDrawStart = null;
let zmDrawRect = null;

function zmEnableDraw() {
  if (!zmLeafletMap) return;
  zmDrawMode = true; zmDrawStart = null;
  if (zmDrawRect) { zmLeafletMap.removeLayer(zmDrawRect); zmDrawRect = null; }
  document.getElementById('zm-map')?.classList.add('draw-mode');
  zmLeafletMap.dragging.disable(); zmLeafletMap.boxZoom.disable();
  const btn = document.getElementById('zm-draw-btn');
  if (btn) { btn.textContent = '✕ Annulla'; btn.classList.add('active'); }
  zmLeafletMap.on('mousedown', _zmDrawDown);
}

function zmDisableDraw() {
  zmDrawMode = false; zmDrawStart = null;
  if (zmDrawRect) { zmLeafletMap.removeLayer(zmDrawRect); zmDrawRect = null; }
  document.getElementById('zm-map')?.classList.remove('draw-mode');
  if (zmLeafletMap) {
    zmLeafletMap.dragging.enable(); zmLeafletMap.boxZoom.enable();
    zmLeafletMap.off('mousedown', _zmDrawDown);
    zmLeafletMap.off('mousemove', _zmDrawMove);
    zmLeafletMap.off('mouseup', _zmDrawUp);
  }
  const btn = document.getElementById('zm-draw-btn');
  if (btn) { btn.textContent = '✏ Disegna bbox'; btn.classList.remove('active'); }
}

function _zmDrawDown(e) {
  if (!zmDrawMode) return;
  zmDrawStart = e.latlng;
  zmLeafletMap.on('mousemove', _zmDrawMove);
  zmLeafletMap.on('mouseup', _zmDrawUp);
}

function _zmDrawMove(e) {
  if (!zmDrawStart) return;
  const b = L.latLngBounds(zmDrawStart, e.latlng);
  zmDrawRect ? zmDrawRect.setBounds(b) : (zmDrawRect = L.rectangle(b, { color:'#E05A1E', weight:2, fillOpacity:0.15, dashArray:'6 4' }).addTo(zmLeafletMap));
}

function _zmDrawUp(e) {
  zmLeafletMap.off('mousemove', _zmDrawMove);
  zmLeafletMap.off('mouseup', _zmDrawUp);
  if (!zmDrawStart || zmSelIdx < 0) { zmDisableDraw(); return; }
  const b = L.latLngBounds(zmDrawStart, e.latlng);
  if (Math.abs(b.getWest()-b.getEast()) < 0.01 || Math.abs(b.getSouth()-b.getNorth()) < 0.01) { zmDisableDraw(); return; }
  const bbox = [+b.getWest().toFixed(3), +b.getEast().toFixed(3), +b.getSouth().toFixed(3), +b.getNorth().toFixed(3)];
  zmPkg[zmSelIdx].meta.bbox = bbox;
  config.meta.bbox = [...bbox];
  zmValidationCache[zmSelIdx] = zmValidate(zmPkg[zmSelIdx]);
  zmDisableDraw();
  const hint = document.getElementById('zm-draw-hint');
  if (hint) { hint.className = 'zm-draw-hint'; hint.textContent = '✓ Bbox salvata: [' + bbox.join(', ') + ']'; }
  setTimeout(zmInitMap, 60);
}

document.getElementById('zm-pkg-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      const zones = zmParsePkg(parsed);
      if (zones.length === 0) { alert('Nessuna zona riconosciuta nel file.\nFormati supportati: array [...], oggetto {"1":{...},...}, config singolo.'); return; }
      zmPkg = zones;
      zmSelIdx = -1;
      zmValidationCache = {};
      zmPkg.forEach((z,i) => { zmValidationCache[i] = zmValidate(z); });
      // Switch to zone manager tab
      activeSection = 'zonemgr';
      zmSubTab = 'list';
      document.querySelectorAll('.nav-item[data-section]').forEach(b => b.classList.toggle('active', b.dataset.section==='zonemgr'));
      document.getElementById('content-inner').classList.add('zm-wide');
      document.getElementById('content-inner').innerHTML = `<div class="section-label">📦 ZONE MANAGER</div>${sectionZoneMgr()}`;
    } catch(err) {
      alert('JSON non valido:\n' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ─── POPOVER ENGINE ───────────────────────────────────────────────────────────
let _activePopoverKey = null;

function _iBadge(docKey) {
  return `<span class="info-badge" onclick="event.stopPropagation();showParamDoc('${docKey}',this)">i</span>`;
}

function showParamDoc(key, el) {
  const doc = PARAM_DOC[key];
  if (!doc) return;

  // Toggle
  if (_activePopoverKey === key) {
    hideParamDoc(); return;
  }

  _activePopoverKey = key;
  document.querySelectorAll('.info-badge').forEach(b => b.classList.remove('active'));
  el.classList.add('active');

  let body = `<div class="pop-short">${doc.short}</div>`;
  if (doc.formula) body += `<div class="pop-block"><div class="pop-block-label">Formula</div><div class="pop-block-content">${doc.formula}</div></div>`;
  if (doc.example) body += `<div class="pop-block"><div class="pop-block-label">Esempio</div><div class="pop-block-content">${doc.example}</div></div>`;
  if (doc.range)   body += `<div class="pop-range"><b>Range tipico:</b> ${doc.range}</div>`;
  if (doc.affects) body += `<div class="pop-affects">Usato da: ${doc.affects}</div>`;

  const pop = document.getElementById('param-popover');
  pop.innerHTML = `
    <div class="pop-header">
      <span>${doc.title}</span>
      <button class="pop-close" onclick="hideParamDoc()">✕</button>
    </div>
    <div class="pop-body">${body}</div>`;

  pop.classList.add('visible');

  // Position: near badge but keep within viewport
  const rect = el.getBoundingClientRect();
  const vw = window.innerWidth, vh = window.innerHeight;
  const pw = 300, ph = 320;
  let left = rect.left + rect.width + 8;
  let top  = rect.top - 8;
  if (left + pw > vw - 8) left = rect.left - pw - 8;
  if (top + ph > vh - 8)  top  = vh - ph - 8;
  if (top < 8)            top  = 8;
  pop.style.left = left + 'px';
  pop.style.top  = top  + 'px';
}

function hideParamDoc() {
  _activePopoverKey = null;
  document.querySelectorAll('.info-badge').forEach(b => b.classList.remove('active'));
  document.getElementById('param-popover').classList.remove('visible');
}

document.addEventListener('click', e => {
  if (!e.target.closest('#param-popover') && !e.target.classList.contains('info-badge')) {
    hideParamDoc();
  }
});
</script>

<!-- Popover DOM (unico, riposizionato via JS) -->
<div id="param-popover"></div>

</body>
